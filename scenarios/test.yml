---
commands:
  - !ProgramEsptool:
    name: "ESP-IDF Programmer"
    firmware: "tekpadz.bin"
    bootloader: "bootloader.bin"
    partition_table: "partition-table.bin"

  - !Loop:
    name: "Loop 5 times"
    iterations: 5
    commands:

      - !SDCardMount:
        name: "SD Card Mount"
        sd_card_path: "D:/SDCard"
        wait_after_s: 1

      - !SdCardDeleteFiles:
        name: "Delete files on SD Card"
        sd_card_path: "D:/SDCard"
        file_pattern: "*"

      - !SDCardUnmount:
        name: "SD Card Unmount"
        sd_card_path: "D:/SDCard"
        wait_after_s: 1

      - !UsbSwitch:
        name: "Control USB Switch Disabled"
        state: false
        wait_after_s: 10

      - !UsbSwitch:
        name: "Control USB Switch Enabled"
        state: true
        wait_after_s: 1

      - !SDCardMount:
        name: "SD Card Mount"
        sd_card_path: "D:/SDCard"
        wait_after_s: 1

      - !SdCardFindFiles:
        name: "Find files on SD Card"
        sd_card_path: "D:/SDCard"
        file_pattern: "*.bin"

      - !SdCardFindFiles:
        name: "Find files on SD Card"
        sd_card_path: "D:/SDCard"
        file_pattern: "*.bin"

      - !SdCardFindFiles:
        name: "Find files on SD Card"
        sd_card_path: "D:/SDCard"
        file_pattern: "*.bin"

      - !SdCardFindFiles:
        name: "Find files on SD Card"
        sd_card_path: "D:/SDCard"
        file_pattern: "*.bin"

      - !SDCardUnmount:
        name: "SD Card Unmount"
        sd_card_path: "D:/SDCard"
        wait_after_s: 1


    

