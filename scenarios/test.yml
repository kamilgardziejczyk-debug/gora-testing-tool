---
commands:
  - !ProgramEsptool:
    name: "ESP-IDF Programmer"
    firmware: "tekpadz.bin"
    bootloader: "bootloader.bin"
    partition_table: "partition-table.bin"

  - !Loop:
    name: "Loop 5 times"
    iterations: 5
    commands:

    - GpioControl:
      name: "Power Off"
      state: false
      pin: 17
      wait_after_s: 1

    - GpioControl:
      name: "Power On"
      state: true
      pin: 17
      wait_after_s: 1

