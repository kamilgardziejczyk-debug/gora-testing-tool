---
commands:
  - !ProgramJlink:
    name: "J-Link NXP RW612 HEX Flashing"
    device: "RW612"
    interface: "SWD"
    speed: 4000
    firmware: "zephyr.hex"
    wait_after_s: 35

  - !SubghzSim:
    port: "/dev/ttyUSB0"
    baud: 115200
    duration_s: 60
    actions:
      - add: temp_hum
        wait_after_ms: 10
      - add: co
        wait_after_ms: 10